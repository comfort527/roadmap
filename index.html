<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>勤務管理平台</title>

  <!-- ── page2 外部依賴（Firebase compat + docx 工具） ── -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/pizzip@3.1.7/dist/pizzip.js"></script>
  <script src="https://unpkg.com/docxtemplater@3.43.0/build/docxtemplater.js"></script>
  <script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.js"></script>

  <style>
    /* ══════════════ 外框佈局 ══════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex; height: 100vh;
      font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
      background: #f2f2f2; overflow: hidden;
    }

    /* ── 側邊欄 ── */
    #sidebar {
      width: 220px; min-width: 220px;
      background: #1a2332;
      display: flex; flex-direction: column;
      transition: width .25s ease, min-width .25s ease;
      overflow: hidden; z-index: 10; flex-shrink: 0;
    }
    #sidebar.collapsed { width: 52px; min-width: 52px; }
    .sidebar-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 14px 14px;
      border-bottom: 1px solid rgba(255,255,255,.08); gap: 8px;
    }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; overflow: hidden; }
    .logo-icon {
      width: 28px; height: 28px; background: #0078d7;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 14px; font-weight: 700; flex-shrink: 0;
    }
    .sidebar-title { color: #fff; font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; opacity: 1; transition: opacity .15s; }
    #sidebar.collapsed .sidebar-title { opacity: 0; width: 0; }
    .toggle-btn { background: none; border: none; cursor: pointer; padding: 6px; color: #8899aa; display: flex; align-items: center; flex-shrink: 0; transition: color .15s; }
    .toggle-btn:hover { color: #fff; }
    nav { padding: 10px 8px; flex: 1; }
    .nav-section-label { color: rgba(255,255,255,.3); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; padding: 0 8px; margin: 12px 0 6px; white-space: nowrap; overflow: hidden; transition: opacity .15s; }
    #sidebar.collapsed .nav-section-label { opacity: 0; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 10px;
      border-radius: 4px; cursor: pointer; color: #8899aa; font-size: 13px;
      transition: background .15s, color .15s; white-space: nowrap; overflow: hidden;
      margin-bottom: 2px; border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: rgba(255,255,255,.07); color: #ccddee; }
    .nav-item.active { background: #0078d7; color: #fff; }
    .nav-icon { width: 20px; height: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .nav-icon svg { width: 16px; height: 16px; }
    .nav-label { transition: opacity .15s; line-height: 1.3; }
    #sidebar.collapsed .nav-label { opacity: 0; }
    .sidebar-footer { padding: 12px 14px; border-top: 1px solid rgba(255,255,255,.07); color: rgba(255,255,255,.2); font-size: 10px; white-space: nowrap; overflow: hidden; transition: opacity .15s; }
    #sidebar.collapsed .sidebar-footer { opacity: 0; }

    /* ── 主內容 ── */
    #content { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .topbar { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 0 20px; height: 48px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .topbar-divider { color: #ccc; font-size: 18px; }
    .topbar-page { font-size: 14px; color: #333; font-weight: 500; }
    .topbar-hint { margin-left: auto; font-size: 12px; color: #999; display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #10b981; }

    /* ── 頁面切換 ── */
    .page-panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .page-panel.active { display: flex; }

    /* ══════════════ PAGE 1 樣式 ══════════════ */
    #p1-root {
      --bg:#f2f2f2; --panel:#ffffff; --text:#000000; --muted:#666666; --border:#cccccc;
      --primary:#0078d7; --primary-hover:#005a9e; --btn-text:#ffffff;
      --danger:#e81123; --success:#107c10; --radius:0px;
      display: grid;
      grid-template-columns: 1fr 500px;
      height: 100%;
      overflow: hidden;
      font-size: 16px;
      line-height: 1.5;
      color: var(--text);
    }
    #p1-root * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    #p1-map-container { position: relative; height: 100%; background: #d1d1d1; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
    #p1-map { flex: 1; width: 100%; }
    .p1-sidebar { background: var(--panel); display: flex; flex-direction: column; height: 100%; z-index: 10; overflow: hidden; }
    .p1-panel-content { padding: 15px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; flex: 1; }
    #p1-root label { display: block; color: var(--text); font-size: 14px; font-weight: 400; margin-bottom: 4px; }
    #p1-root input, #p1-root select, #p1-root textarea {
      width: 100%; border: 1px solid var(--muted); border-radius: var(--radius);
      padding: 8px 10px; font-size: 15px; background: #fff; outline: none; transition: border-color .1s;
    }
    #p1-root input:focus, #p1-root select:focus, #p1-root textarea:focus { border: 2px solid var(--primary); padding: 7px 9px; }
    #p1-root textarea { min-height: 40px; resize: none; overflow: hidden; font-family: inherit; }
    .p1-row { display: flex; gap: 8px; align-items: center; }
    .p1-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    #p1-root button {
      border: 1px solid transparent; background: #ccc; color: #000;
      padding: 6px 12px; cursor: pointer; font-size: 15px;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: all .1s;
    }
    #p1-root button:hover { background: #bbb; }
    #p1-root button.primary { background: var(--primary); color: var(--btn-text); border-color: var(--primary); }
    #p1-root button.primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
    #p1-root button.danger { color: var(--btn-text); background: var(--danger); border-color: var(--danger); }
    .p1-btn-locate-coord { padding: 8px; min-width: 38px; background: #f2f2f2; border: 1px solid var(--muted); }
    .p1-route-segment-card { background: #fff; border: 1px solid var(--border); margin-bottom: 15px; transition: opacity .2s; }
    .p1-route-segment-card summary { padding: 12px; cursor: pointer; list-style: none; background: #fdfdfd; font-weight: 600; }
    .p1-route-segment-card[open] summary { border-bottom: 1px solid var(--border); background: #f2f2f2; }
    .p1-segment-header-ui { display: flex; justify-content: space-between; align-items: center; width: 100%; }
    .p1-segment-title { color: var(--primary); font-size: 15px; display: flex; align-items: baseline; gap: 6px; }
    .p1-segment-inner-content { padding: 15px; display: flex; flex-direction: column; gap: 12px; }
    .p1-segment-visibility-bar { background: #f2f2f2; border: 1px solid var(--border); padding: 6px 10px; display: flex; align-items: center; justify-content: space-around; }
    .p1-segment-visibility-bar label { margin: 0; display: flex; align-items: center; gap: 4px; font-size: 13px; }
    .p1-police-results-list { max-height: 150px; overflow-y: auto; border: 1px solid var(--border); background: #fff; margin-top: 8px; scroll-behavior: smooth; }
    .p1-police-item { padding: 8px 12px; border-bottom: 1px solid #f2f2f2; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
    .p1-police-item:hover { background: #e5f1fb; }
    .p1-police-item.selected { background: #cce4f7; border-left: 3px solid var(--primary); }
    .p1-legend { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,.9); padding: 8px 12px; border: 1px solid var(--border); font-size: 12px; pointer-events: none; z-index: 5; }
    .p1-pill { display: flex; align-items: center; gap: 6px; }
    .p1-pill::before { content: ''; width: 8px; height: 8px; }
    .p1-pill.main::before { background: var(--primary); }
    .p1-pill.hospital::before { background: var(--danger); }
    .p1-pill.police::before { background: #107c10; }
    #p1-toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff; padding: 10px 20px; font-size: 14px; opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 1000; }
    #p1-toast.show { opacity: 1; }
    .p1-quick-select { height: 32px; font-size: 14px; padding: 0 8px; margin-top: 4px; background: #fff; border: 1px solid var(--muted); }
    .p1-storage-list { max-height: 150px; overflow-y: auto; border: 1px solid var(--border); margin-top: 8px; background: #fff; }
    .p1-storage-item { padding: 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
    .p1-btn-tactical { font-size: 12px; padding: 2px 8px; background: transparent; color: var(--primary); border: 1px solid var(--primary); }
    .p1-btn-tactical:hover { background: var(--primary); color: #fff; }
    .p1-spacer { height: 50px; flex-shrink: 0; }
    #p1-root optgroup { font-weight: bold; color: var(--primary); background: #f2f2f2; }
    #p1-fileInput { display: none; }

    /* ══════════════ PAGE 2 樣式 ══════════════ */
    #p2-root {
      flex: 1; overflow-y: auto;
      font-family: "Segoe UI", "Microsoft JhengHei", Arial, sans-serif;
      background: #f2f2f2;
      color: #000;
      padding: 8px;
    }
    #p2-root {
      --primary: #0078d4; --primary-dark: #005a9e;
      --bg-gray: #f2f2f2; --card-bg: #ffffff;
      --text-main: #000000; --text-muted: #666666;
      --red-bg: #fde7e9; --green-bg: #dff6dd; --blue-bg: #e1f0fe;
      --border-color: #d2d2d2; --dark-bg: #2b2b2b; --dark-field: #333333;
      --content-bg: #ffe5d9;
    }
    #p2-root .app-container { max-width: 155vh; margin: 0 auto; }
    #p2-root .toolbar {
      background: #fff; padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border-color);
      position: sticky; top: 0; z-index: 100; margin-bottom: 12px;
      flex-wrap: wrap; gap: 10px;
    }
    #p2-root .toolbar h1 { font-size: 16px; margin: 0; font-weight: 400; color: var(--text-main); display: flex; align-items: center; gap: 12px; }
    #p2-root .toolbar h1::before { content: "田"; font-size: 18px; color: var(--primary); }
    #p2-root .cloud-manager {
      display: none; position: absolute; right: 0; top: 100%; margin-top: 1px; width: 450px;
      background: white; border: 1px solid var(--border-color);
      box-shadow: 0 4px 10px rgba(0,0,0,.1); z-index: 200; padding: 15px;
    }
    #p2-root .show-ui { display: block; }
    #p2-root .global-settings { background: var(--dark-bg); padding: 16px; display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 12px; }
    #p2-root .global-settings label { color: #fff; font-size: 13px; font-weight: normal; display: block; margin-bottom: 6px; }
    #p2-root .global-settings input { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.3); color: white; padding: 6px; width: 100%; box-sizing: border-box; font-size: 14px; }
    #p2-root .global-settings input:focus { background: white; color: black; border-color: var(--primary); outline: none; }
    #p2-root .record-item { background: var(--card-bg); border: 1px solid var(--border-color); padding: 16px; margin-bottom: 12px; position: relative; transition: border-color .2s; }
    #p2-root .record-item:hover { border-color: #999; }
    #p2-root .record-item.dragging { opacity: .5; border: 2px dashed var(--primary); }
    #p2-root .drag-handle { cursor: grab; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 20px; padding: 0 4px; user-select: none; }
    #p2-root .record-header { display: flex; align-items: flex-start; gap: 12px; border-bottom: 1px solid #f0f0f0; padding-bottom: 12px; margin-bottom: 16px; }
    #p2-root .record-item.collapsed .record-content { display: none; }
    #p2-root .seq-badge { background: var(--primary); color: white; font-weight: normal; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    #p2-root .top-fields { display: grid; grid-template-columns: 2fr 3fr 3fr 2fr; gap: 12px; flex-grow: 1; }
    #p2-root .field-group { background: transparent; display: flex; flex-direction: column; }
    #p2-root .field-group label { font-size: 13px; font-weight: 600; color: #333; display: block; margin-bottom: 4px; }
    #p2-root input, #p2-root textarea, #p2-root select { width: 100%; box-sizing: border-box; border: 1px solid #999; padding: 6px 10px; font-size: 15px; font-family: inherit; background: #fff; border-radius: 0; }
    #p2-root input:focus, #p2-root textarea:focus, #p2-root select:focus { border: 2px solid var(--primary); padding: 5px 9px; outline: none; }
    #p2-root .has-content { background-color: var(--content-bg) !important; border-color: #f2c1b0 !important; }
    #p2-root textarea { resize: none; overflow: hidden; min-height: 48px; line-height: 1.5; }
    #p2-root button, #p2-root .btn-download, #p2-root .btn-tag, #p2-root .btn-cloud, #p2-root .btn-add { border: none; padding: 8px 16px; font-size: 14px; cursor: pointer; border-radius: 0; background: #ccc; color: black; }
    #p2-root button:hover, #p2-root .btn-add:hover { background: #bbb; }
    #p2-root .btn-download { background: var(--primary); color: white; }
    #p2-root .btn-cloud { background: #333; color: white; }
    #p2-root .btn-arrow { width: 24px; height: 24px; background: #eee; color: var(--primary); border: 1px solid #ccc; margin-left: 8px; font-size: 12px; padding: 0; }
    #p2-root .btn-icon { border: none; background: none; color: var(--text-muted); cursor: pointer; font-size: 18px; padding: 4px; }
    #p2-root .main-route-container { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 12px; }
    @media (min-width: 768px) { #p2-root .main-route-container { grid-template-columns: 7fr 2fr 1fr; } }
    #p2-root .route-box { background: var(--blue-bg); border: 1px solid #bce0fd; padding: 12px; }
    #p2-root .medical-box { background: var(--red-bg); border: 1px solid #fbcaca; padding: 12px; }
    #p2-root .shelter-box { background: var(--green-bg); border: 1px solid #bbf7d0; padding: 12px; }
    #p2-root .checkbox-group { display: flex; flex-direction: column; gap: 6px; }
    #p2-root .checkbox-group label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #333; cursor: pointer; white-space: nowrap; font-weight: normal; }
    #p2-root .checkbox-group input[type="checkbox"] { width: 14px; height: 14px; margin: 0; }
    #p2-root .btn-add { width: 100%; background: #fff; border: 1px solid var(--primary); color: var(--primary); font-weight: 600; margin-top: 8px; }
    #p2-msgBox { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 24px; z-index: 9999; display: none; }
    #p2-cloudRecoveryBar { display: none; background: #fff4ce; border: 1px solid #fde79e; padding: 12px 16px; margin-bottom: 12px; justify-content: space-between; align-items: center; font-size: 13px; color: black; font-weight: 600; }
    #p2-root .template-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
  </style>
</head>
<body>

<!-- ══ 側邊欄 ══ -->
<aside id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <div class="logo-icon">勤</div>
      <span class="sidebar-title">勤務管理平台</span>
    </div>
    <button class="toggle-btn" id="toggleBtn" title="收合選單">
      <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
        <rect x="2" y="4" width="16" height="2" rx="1"/>
        <rect x="2" y="9" width="16" height="2" rx="1"/>
        <rect x="2" y="14" width="16" height="2" rx="1"/>
      </svg>
    </button>
  </div>
  <nav>
    <div class="nav-section-label">系統功能</div>
    <button class="nav-item active" data-page="page1" onclick="switchPage(this)">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </span>
      <span class="nav-label">機動路線規劃工具</span>
    </button>
    <button class="nav-item" data-page="page2" onclick="switchPage(this)">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </span>
      <span class="nav-label">道路表文書系統</span>
    </button>
  </nav>
  <div class="sidebar-footer">勤務管理平台 v2.5</div>
</aside>

<!-- ══ 主內容 ══ -->
<div id="content">
  <div class="topbar">
    <span style="font-size:13px;color:#888;">勤務管理平台</span>
    <span class="topbar-divider">/</span>
    <span class="topbar-page" id="currentPageName">機動路線規劃工具</span>
    <div class="topbar-hint"><div class="status-dot"></div><span>已連線</span></div>
  </div>

  <!-- ══ PAGE 1：機動路線規劃工具 ══ -->
  <div class="page-panel active" id="panel-page1">
    <div id="p1-root">
      <div id="p1-map-container">
        <div class="p1-legend">
          <div class="p1-pill main">機動路線</div>
          <div class="p1-pill hospital">醫院</div>
          <div class="p1-pill police">派出所</div>
        </div>
        <div id="p1-map"></div>
      </div>
      <div class="p1-sidebar">
        <div class="p1-panel-content">
          <details class="collapsible-section" style="border:1px solid var(--border);background:#fff;">
            <summary style="padding:10px;font-size:14px;background:#fdf2f8;">💾 路線管理 (雲端/檔案)</summary>
            <div class="section-body" style="padding:10px">
              <div class="p1-row" style="margin-bottom:8px">
                <input id="p1-saveName" type="text" placeholder="路線名稱" style="font-size:14px;" />
                <button id="p1-btnExportJson" title="匯出包含地理座標的 JSON" style="font-size:13px;min-width:80px;">💾 匯出</button>
                <button id="p1-btnSaveCloud" class="primary" title="存至雲端記憶空間" style="font-size:13px;min-width:80px;">☁️ 雲端</button>
              </div>
              <button id="p1-btnSendToDoc" style="width:100%;background:#107c10;color:#fff;border:none;font-size:13px;padding:7px;margin-bottom:8px;cursor:pointer;">📋 匯出並送至道路表文書系統</button>
              <button id="p1-btnImportJson" style="width:100%;background:#e1dfdd;font-size:13px;margin-bottom:8px;">📂 載入本機 JSON 檔案</button>
              <input type="file" id="p1-fileInput" accept=".json" />
              <div style="font-size:12px;color:var(--muted);margin:4px 0;">雲端存檔清單：</div>
              <div class="p1-storage-list" id="p1-storageList">
                <div style="padding:10px;color:var(--muted);text-align:center;font-size:13px;">載入雲端清單中...</div>
              </div>
            </div>
          </details>
          <details class="collapsible-section" open style="border:1px solid var(--border);background:#fff;">
            <summary style="padding:10px;font-size:14px;background:#f2f2f2;">🗺️ 多段路線規劃</summary>
            <div class="section-body" id="p1-route-segments-container" style="padding:10px"></div>
            <div style="padding:0 10px 10px 10px;">
              <button id="p1-btnAddSegment" class="primary" style="width:100%;font-size:16px;">+ 新增下一段路線</button>
            </div>
          </details>
          <div class="p1-grid-2">
            <details class="collapsible-section" style="border:1px solid var(--border);">
              <summary style="padding:8px;font-size:13px;">🏥 醫院庫</summary>
              <div class="section-body" style="padding:8px">
                <div class="p1-row"><input id="p1-medInput" type="text" placeholder="名稱" /><button id="p1-btnMedSearch">+</button></div>
                <select id="p1-medDbSelect" size="4" style="margin-top:5px;font-size:13px;"></select>
                <button id="p1-btnDeleteMed" class="danger" style="width:100%;margin-top:5px;font-size:12px;padding:4px;">刪除醫院</button>
              </div>
            </details>
            <details class="collapsible-section" style="border:1px solid var(--border);">
              <summary style="padding:8px;font-size:13px;">⚙️ 設定</summary>
              <div class="section-body" style="padding:8px">
                <label style="font-size:12px;">Maps Key</label>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDocs, deleteDoc, collection, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  // Firebase config（若平台提供 __firebase_config 則使用，否則用空殼）
  let firebaseConfig = {};
  try { firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}'); } catch(e) {}
  const appId = typeof __app_id !== 'undefined' ? __app_id : 'route-planner';

  let p1App, p1Auth, p1Db, p1CurrentUser = null;
  try {
    p1App = initializeApp(firebaseConfig, 'p1App');
    p1Auth = getAuth(p1App);
    p1Db = getFirestore(p1App);
  } catch(e) { console.warn('Page1 Firebase init skipped:', e.message); }

  async function p1InitAuth() {
    if (!p1Auth) return;
    try {
      if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
        await signInWithCustomToken(p1Auth, __initial_auth_token);
      } else {
        await signInAnonymously(p1Auth);
      }
    } catch(e) { console.error("P1 Auth error", e); }
  }
  if (p1Auth) {
    onAuthStateChanged(p1Auth, (user) => {
      p1CurrentUser = user;
      if (user) window.p1RefreshStorageList();
    });
  }

  const p1$ = id => document.getElementById(id);
  const p1State = { map: null, places: null, dirSvc: null, segments: {}, medDb: [] };

  window.p1Toast = (msg, type='info') => {
    const t = p1$('p1-toast'); t.textContent = msg;
    t.style.borderLeft = `4px solid ${type==='error'?'#e81123':(type==='success'?'#107c10':'#0078d7')}`;
    t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
  };
  window.p1SyncAutoHeight = (el) => { if(el){ el.style.height='auto'; el.style.height=el.scrollHeight+'px'; } };
  window.p1SimplifyPoliceName = (name) => name.replace(/政府警察局/g,'警局').replace(/分局/g,'分局 ').replace(/派出所/g,'所');
  window.p1DistM = (a,b) => {
    const lat1=typeof a.lat==='function'?a.lat():a.lat, lng1=typeof a.lng==='function'?a.lng():a.lng;
    const lat2=typeof b.lat==='function'?b.lat():b.lat, lng2=typeof b.lng==='function'?b.lng():b.lng;
    const R=6371e3,f1=lat1*Math.PI/180,f2=lat2*Math.PI/180;
    const df=(lat2-lat1)*Math.PI/180,dl=(lng2-lng1)*Math.PI/180;
    const A=Math.sin(df/2)**2+Math.cos(f1)*Math.cos(f2)*Math.sin(dl/2)**2;
    return R*2*Math.atan2(Math.sqrt(A),Math.sqrt(1-A));
  };
  window.p1ExtractCounty = (address) => {
    if(!address) return '其他';
    const m=address.match(/(臺北市|台北市|新北市|基隆市|桃園市|新竹縣|新竹市|苗栗縣|臺中市|台中市|彰化縣|南投縣|雲林縣|嘉義縣|嘉義市|臺南市|台南市|高雄市|屏東縣|宜蘭縣|花蓮縣|臺東縣|台東縣|澎湖縣|金門縣|連江縣)/);
    return m ? m[1].replace('台','臺') : '其他';
  };
  window.p1UpdateSegmentTitles = () => {
    document.querySelectorAll('.p1-route-segment-card').forEach((card, index) => {
      const sid=card.dataset.segmentId, num=index+1;
      const mainTitle=num===1?"第一段":`第${['','','二','三','四','五','六','七','八','九','十'][num]||num}段`;
      let startDisp=card.querySelector('.p1-start-alias').value.trim()||card.querySelector('.p1-start-input').value.trim();
      let endDisp=card.querySelector('.p1-end-alias').value.trim()||card.querySelector('.p1-end-input').value.trim();
      if(startDisp.length>8) startDisp=startDisp.substring(0,8)+'..';
      if(endDisp.length>8) endDisp=endDisp.substring(0,8)+'..';
      const routeInfo=(startDisp||endDisp)?`：${startDisp||'?'} ⇀ ${endDisp||'?'}`:"";
      card.querySelector('.p1-segment-title').innerHTML=`<span>[${num}] ${mainTitle}</span><span style="color:#666666;font-size:13px;font-weight:normal;margin-left:8px;">${routeInfo}</span>`;
      if(p1State.segments[sid]){
        p1State.segments[sid].mainR.setOptions({polylineOptions:{strokeColor:['#0078d7','#8764b8','#00b7c3','#475569'][index]||'#475569',strokeWeight:6,zIndex:20}});
      }
    });
  };
  window.p1LoadAllSegmentsData = (jsonStr) => {
    const item=JSON.parse(decodeURIComponent(jsonStr));
    const container=p1$('p1-route-segments-container');
    container.innerHTML='';
    p1$('p1-saveName').value=item.name||"";
    item.segments.forEach(s => {
      const card=window.p1AddRouteSegment();
      card.querySelector('.p1-start-input').value=s.config.start;
      card.querySelector('.p1-start-alias').value=s.config.startAlias;
      card.querySelector('.p1-end-input').value=s.config.end;
      card.querySelector('.p1-end-alias').value=s.config.endAlias;
      card.querySelector('.p1-mode-select').value=s.config.mode;
      card.querySelector('.p1-poi-select').value=s.config.poiOrigin;
      card.querySelector('.p1-txt-main').value=s.texts.main;
      card.querySelector('.p1-txt-police').value=s.texts.police;
      card.querySelector('.p1-txt-hosp').value=s.texts.hospital;
      window.p1SyncAutoHeight(card.querySelector('.p1-txt-main'));
      window.p1SyncAutoHeight(card.querySelector('.p1-txt-police'));
      window.p1SyncAutoHeight(card.querySelector('.p1-txt-hosp'));
    });
    window.p1UpdateSegmentTitles();
  };

  window.p1ExecuteRouteForSegment = async (sid) => {
    const card=document.querySelector(`[data-segment-id="${sid}"]`);
    const org=card.querySelector('.p1-start-input').value.trim(), dest=card.querySelector('.p1-end-input').value.trim();
    if(!org||!dest) return window.p1Toast('請輸入起終點','error');
    p1State.dirSvc.route({origin:org,destination:dest,travelMode:google.maps.TravelMode[card.querySelector('.p1-mode-select').value]},(res,status)=>{
      if(status==='OK'){p1State.segments[sid].mainR.setDirections(res);p1State.map.fitBounds(res.routes[0].bounds);window.p1Toast('規劃完成');}
      else{window.p1Toast('規劃失敗: '+status,'error');}
    });
  };

  // ★ 將下方網址換成您的 Google Apps Script 網頁應用程式網址
  const AI_PROXY_URL = 'https://script.google.com/macros/s/AKfycbxydhxwefhLjDW3CIhxNT7JSIH-1WHeAG4MVQszZfE_af2PSdpUWpR27LL91tyP1ll9/exec';

  async function p1CallGemini(systemPrompt, userQuery) {
    const maxRetries = 3; let delay = 1000;
    for (let i = 0; i < maxRetries; i++) {
      try {
        const response = await fetch(AI_PROXY_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' }, // GAS 需用 text/plain 避免 preflight
          body: JSON.stringify({ systemPrompt, userQuery })
        });
        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err?.error || `HTTP ${response.status}`);
        }
        const result = await response.json();
        if (result.text) return result.text;
        throw new Error(result.error || 'Empty response');
      } catch (e) {
        if (i === maxRetries - 1) return `[系統錯誤] AI 暫時無法回應：${e.message}`;
        await new Promise(r => setTimeout(r, delay)); delay *= 2;
      }
    }
  }

  window.p1LocateByInput = (sid, inputClass) => {
    const card=document.querySelector(`[data-segment-id="${sid}"]`);
    const input=card.querySelector(`.${inputClass}`);
    const val=input.value.trim();
    const coordMatch=val.match(/^([-+]?\d{1,2}\.\d+)\s*,\s*([-+]?\d{1,3}\.\d+)$/);
    if(coordMatch){
      const pos=new google.maps.LatLng(parseFloat(coordMatch[1]),parseFloat(coordMatch[2]));
      p1State.map.setCenter(pos); p1State.map.setZoom(16);
      const m=new google.maps.Marker({position:pos,map:p1State.map,animation:google.maps.Animation.DROP});
      setTimeout(()=>m.setMap(null),3000);
      window.p1Toast(`座標定位成功`,'success');
    } else { window.p1Toast('請輸入緯度, 經度','error'); }
  };

  window.p1AddRouteSegment = () => {
    const id=`seg-${Date.now()}`;
    const card=document.createElement('details');
    card.className='p1-route-segment-card'; card.open=true; card.dataset.segmentId=id;
    card.ontoggle=()=>{
      const s=p1State.segments[id]; if(!s) return;
      if(!card.open){s.mainR.setMap(null);s.hospR.setMap(null);s.policeR.setMap(null);s.candidateMarkers.forEach(m=>m.setMap(null));}
      else{
        if(card.querySelector('.p1-chk-main').checked) s.mainR.setMap(p1State.map);
        if(card.querySelector('.p1-chk-hospital').checked) s.hospR.setMap(p1State.map);
        if(card.querySelector('.p1-chk-police').checked){s.policeR.setMap(p1State.map);s.candidateMarkers.forEach(m=>m.setMap(p1State.map));}
      }
    };
    card.innerHTML=`
      <summary><div class="p1-segment-header-ui"><div class="p1-segment-title">載入中...</div><button onclick="window.p1RemoveSegment('${id}')" style="color:#e81123;background:none;padding:2px 5px;font-size:12px;">移除</button></div></summary>
      <div class="p1-segment-inner-content">
        <div><label>起點</label><select class="p1-quick-select p1-start-quick"><option value="">— 常用點 —</option><option value="106台灣大安區敦化南路二段70號|敦南寓所">敦南寓所</option><option value="111臺北市士林區新安路120號|陽明寓所">陽明寓所</option></select>
          <div class="p1-row" style="margin-top:4px"><input class="p1-start-input" type="text" placeholder="地址或座標" style="flex:2" /><button class="p1-btn-locate-coord" onclick="window.p1LocateByInput('${id}','p1-start-input')" title="座標定位">📍</button><input class="p1-start-alias" type="text" placeholder="代稱" style="flex:1" /></div></div>
        <div><label>終點</label><select class="p1-quick-select p1-end-quick"><option value="">— 常用點 —</option><option value="106台灣大安區敦化南路二段70號|敦南寓所">敦南寓所</option><option value="111臺北市士林區新安路120號|陽明寓所">陽明寓所</option></select>
          <div class="p1-row" style="margin-top:4px"><input class="p1-end-input" type="text" placeholder="地址或座標" style="flex:2" /><button class="p1-btn-locate-coord" onclick="window.p1LocateByInput('${id}','p1-end-input')" title="座標定位">📍</button><input class="p1-end-alias" type="text" placeholder="代稱" style="flex:1" /></div></div>
        <div class="p1-grid-2"><div><label>模式</label><select class="p1-mode-select"><option value="DRIVING" selected>開車</option><option value="WALKING">步行</option></select></div><div><label>POI 圓心</label><select class="p1-poi-select"><option value="end" selected>終點周邊</option><option value="start">起點周邊</option><option value="mid">路線中點</option></select></div></div>
        <button class="primary" onclick="window.p1ExecuteRouteForSegment('${id}')" style="width:100%;padding:10px;">路線規劃</button>
        <div class="p1-segment-visibility-bar"><label><input class="p1-chk-main" type="checkbox" checked> 機動路線</label><label><input class="p1-chk-hospital" type="checkbox" checked> 醫院</label><label><input class="p1-chk-police" type="checkbox" checked> 派出所</label></div>
        <hr style="border:0;border-top:1px solid #ccc;margin:5px 0">
        <div><div class="p1-row" style="margin-bottom:4px;justify-content:space-between"><label>機動路線</label><button class="p1-btn-tactical p1-btn-rewrite-main">✨ AI 改寫</button></div><textarea class="p1-txt-main" placeholder="路徑描述..."></textarea></div>
        <div><div class="p1-row" style="margin-bottom:4px;justify-content:space-between"><label>醫院</label><button class="p1-btn-tactical p1-btn-rewrite-hosp">✨ AI 改寫</button></div><textarea class="p1-txt-hosp" placeholder="手動輸入或自動規劃..." style="height:50px;"></textarea></div>
        <div style="background:#f9f9f9;padding:8px;"><div class="p1-row" style="margin-bottom:4px;justify-content:space-between"><label style="color:#0078d7;font-weight:600;">派出所</label><button class="p1-btn-tactical p1-btn-rewrite-police">✨ AI 改寫</button></div><div class="p1-police-results-list" style="display:none;margin-bottom:8px;"></div><textarea class="p1-txt-police" placeholder="手動輸入或自動掃描..." style="height:50px;"></textarea></div>
      </div>
    `;
    p1$('p1-route-segments-container').appendChild(card);
    p1InitializeSegment(card, id);
    window.p1UpdateSegmentTitles();
    return card;
  };

  function p1InitializeSegment(card, sid) {
    p1State.segments[sid]={mainR:p1CreateRenderer('#0078d7',20),policeR:p1CreateRenderer('#107c10',15),hospR:p1CreateRenderer('#e81123',16),candidateMarkers:[],result:null};
    const autoOpt={componentRestrictions:{country:'tw'},fields:['formatted_address','geometry','name']};
    new google.maps.places.Autocomplete(card.querySelector('.p1-start-input'),autoOpt);
    new google.maps.places.Autocomplete(card.querySelector('.p1-end-input'),autoOpt);
    const tacticalRewrite=async(textarea,contextType)=>{
      if(!textarea.value||textarea.value.length<5) return;
      const startAlias=card.querySelector('.p1-start-alias').value.trim();
      const endAlias=card.querySelector('.p1-end-alias').value.trim();
      const originalText=textarea.value; textarea.value=` AI 戰術編稿中...`;
      let aliasRules=(startAlias||endAlias)?`\n- 地址代號轉換規則（核心指令）：${startAlias?`\n  - 起點代稱為「${startAlias}」`:''}${endAlias?`\n  - 終點代稱為「${endAlias}」`:''}`:`\n- 地址代號轉換規則（核心指令）：\n  (若無特定指示，請保留原格式標記)`;
      const SYSTEM_PROMPT=`角色設定：你是一位負責編撰勤務路線的特勤警衛官。你的任務是將導航式文字轉換為極度精簡、準確且符合特勤慣例的「機動路線」。\n格式與符號規範：\n- 統一使用全形右箭頭「→」連接。\n- 地址代號轉換規則（核心指令）：${aliasRules}\n  - 原有的【】標籤如果已經帶有代稱，請務必完整保留。\n- 禁用詞彙：禁止出現「往南走」、「向左轉進入...」、「朝...前進」、「經過...」、「收費路段」等贅詞。\n- 專業術語：僅使用範例「右轉建國南路」、「左轉中華路」、「直行」、「接中華路」、「上/下（匝道/交流道）」維護。\n- 格式要求：請保留路線結尾的「預估時間」與「距離」資訊。`;
      const result=await p1CallGemini(SYSTEM_PROMPT,originalText); textarea.value=result; window.p1SyncAutoHeight(textarea); window.p1Toast(`改寫完成`,'success');
    };
    card.querySelector('.p1-btn-rewrite-main').onclick=()=>tacticalRewrite(card.querySelector('.p1-txt-main'),"機動路線");
    card.querySelector('.p1-btn-rewrite-police').onclick=()=>tacticalRewrite(card.querySelector('.p1-txt-police'),"派出所");
    card.querySelector('.p1-btn-rewrite-hosp').onclick=()=>tacticalRewrite(card.querySelector('.p1-txt-hosp'),"醫院");
    p1State.segments[sid].mainR.addListener('directions_changed',()=>{
      const res=p1State.segments[sid].mainR.getDirections(); p1State.segments[sid].result=res;
      p1RefreshHospitalOnly(sid); p1SearchPolice(sid);
      card.querySelector('.p1-txt-main').value=p1StepsToArrow(res,card.querySelector('.p1-start-alias').value||'起點',card.querySelector('.p1-end-alias').value||'終點');
      window.p1SyncAutoHeight(card.querySelector('.p1-txt-main')); window.p1UpdateSegmentTitles();
    });
    p1State.segments[sid].policeR.addListener('directions_changed',()=>{
      const res=p1State.segments[sid].policeR.getDirections();
      const txt=card.querySelector('.p1-txt-police');
      txt.value=p1StepsToArrow(res,"警力點","支援單位 (經調整)"); window.p1SyncAutoHeight(txt);
    });
    p1State.segments[sid].hospR.addListener('directions_changed',()=>{
      const res=p1State.segments[sid].hospR.getDirections();
      const txt=card.querySelector('.p1-txt-hosp');
      txt.value=p1StepsToArrow(res,"醫學中心","責任醫院 (經調整)"); window.p1SyncAutoHeight(txt);
    });

    card.querySelectorAll('.p1-start-input,.p1-start-alias,.p1-end-input,.p1-end-alias').forEach(i=>i.addEventListener('input',window.p1UpdateSegmentTitles));

<script>
(function(){

      const doc=await p2Db.doc(`artifacts/${p2AppId}/users/${p2User.uid}/settings/template`).get();

  };
  p2.uploadTemplateToCloud=async function(input){
    if(!input.files.length) return;

    reader.onload=async(e)=>{
      const base64=p2BufferToBase64(e.target.result);
      try{
        if(p2Db) await p2Db.doc(`artifacts/${p2AppId}/users/${p2User.uid}/settings/template`).set({binary:base64,name:file.name,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});

  }
  async function p2CheckLatestCloudProgress(){

      const snapshot=await p2Db.collection(`artifacts/${p2AppId}/users/${p2User.uid}/saves`).get();
      if(!snapshot.empty){const saves=snapshot.docs.map(d=>({id:d.id,...d.data()}));saves.sort((a,b)=>(b.timestamp?.seconds||0)-(a.timestamp?.seconds||0));latestSaveId=saves[0].id;$2('p2-cloudRecoveryBar').style.display='flex';}
    }catch(err){}
  }
  p2.loadLatestFromCloud=async function(){if(latestSaveId){await p2.loadDoc(latestSaveId);$2('p2-cloudRecoveryBar').style.display='none';}};
  p2.saveToCloud=async function(){
    if(!p2User) await p2InitFirebase();
    if(!p2Db){p2ShowMsg("Firebase 未連線");return;}
    const data=p2CaptureCurrentData(),docId=data.saveName;
    try{await p2Db.doc(`artifacts/${p2AppId}/users/${p2User.uid}/saves/${docId}`).set({...data,timestamp:firebase.firestore.FieldValue.serverTimestamp()});p2ShowMsg(`✅ 已儲存：${docId}`);}
    catch(e){p2ShowMsg("❌ 儲存失敗");}
  };
  p2.loadDoc=async function(id){
    if(!p2Db) return;
    try{const doc=await p2Db.doc(`artifacts/${p2AppId}/users/${p2User.uid}/saves/${id}`).get();if(doc.exists)p2RestoreData(doc.data());}catch(e){p2ShowMsg("❌ 載入失敗");}
  };
  p2.toggleCloudManager=function(){$2('p2-cloudManager').classList.toggle('show-ui');};

  function p2BufferToBase64(buffer){return btoa(new Uint8Array(buffer).reduce((data,byte)=>data+String.fromCharCode(byte),''));}
  function p2Base64ToBuffer(base64){const bs=atob(base64),bytes=new Uint8Array(bs.length);for(let i=0;i<bs.length;i++)bytes[i]=bs.charCodeAt(i);return bytes.buffer;}

  function p2CaptureCurrentData(){
    return{
      saveName:$2('p2-saveFileName').value||"備份檔",
      global:{deptPlace:$2('p2-globalDeptPlace').value,deptTime:$2('p2-globalDeptTime').value,prepTime:$2('p2-globalPrepTime').value,standbyTime:$2('p2-globalStandbyTime').value,docDate:$2('p2-inputDocDate').value},
      records:Array.from(document.querySelectorAll('#p2-recordsContainer .record-item')).map(card=>({
        isLast:card.dataset.isLast==="true",code:card.querySelector('.val-temp-code').value,hsr:card.querySelector('.val-hsr').value,place:card.querySelector('.val-place').value,time:card.querySelector('.val-time').value,
        mobR:card.querySelector('.val-mobile-route').value,unit:card.querySelector('.val-unit').value,medF:card.querySelector('.val-medical-facility').value,medR:card.querySelector('.val-medical-route').value,
        sheP:card.querySelector('.val-shelter').value,evaR:card.querySelector('.val-evacuation-route').value,chkC:card.querySelector('.val-chk-city').checked,chkH:card.querySelector('.val-chk-highway').checked,chkN:card.querySelector('.val-chk-none').checked
      }))
    };
  }
  function p2RestoreData(data){
    if(!data.global||!data.records) return;
    $2('p2-globalDeptPlace').value=data.global.deptPlace;$2('p2-globalDeptTime').value=data.global.deptTime;
    $2('p2-globalPrepTime').value=data.global.prepTime;$2('p2-globalStandbyTime').value=data.global.standbyTime;
    $2('p2-inputDocDate').value=data.global.docDate;
    $2('p2-recordsContainer').innerHTML=""; recordCount=0;
    data.records.forEach(r=>p2.addRecord(r.isLast,r));
  }
  p2.exportProgressFile=function(){
    const data=p2CaptureCurrentData();
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const fileName=`${data.saveName}_${new Date().toISOString().slice(0,10)}.json`;
    saveAs(blob,fileName); p2ShowMsg(`✅ 已匯出本機備份：${fileName}`);
  };
  p2.importProgressFile=function(input){
    const reader=new FileReader();
    reader.onload=(e)=>{
      const d=JSON.parse(e.target.result);
      if(d.segments&&Array.isArray(d.segments)){
        $2('p2-saveFileName').value=d.name||"匯入資料";
        $2('p2-recordsContainer').innerHTML=""; recordCount=0;
        d.segments.forEach(seg=>{p2.addRecord(false,{place:seg.config.endAlias||"",mobR:seg.texts.main||"",evaR:seg.texts.police||"",medR:seg.texts.hospital||"",chkN:true});});
        p2ShowMsg(`✅ 已從 Routing JSON 匯入 ${d.segments.length} 筆資料`);
      }else if(d.global&&d.records){
        p2RestoreData(d);$2('p2-saveFileName').value=d.saveName||"復原存檔";p2ShowMsg(`📂 已還原本機備份：${d.saveName}`);
      }else{p2ShowMsg("❌ 無法識別的 JSON 格式");}
    };
    reader.readAsText(input.files[0]);
  };

  // 由 page1 直接呼叫的匯入函式
  window.p2ImportRouteData=function(data){
    if(!data||!data.segments) return;
    $2('p2-saveFileName').value=data.name||'匯入資料';
    $2('p2-recordsContainer').innerHTML=''; recordCount=0;
    data.segments.forEach(seg=>{
      p2.addRecord(false,{place:seg.config.endAlias||seg.config.end||'',mobR:seg.texts.main||'',evaR:seg.texts.police||'',medR:seg.texts.hospital||'',chkN:true});
    });
    p2ShowMsg(`✅ 已從路線規劃工具匯入 ${data.segments.length} 段資料`);
  };

  function p2GetOptionsHtml(){
    let h='<option value="">--</option>';
    fixedCodes.forEach(c=>h+=`<option value="${c}">${c}</option>`);
    dynamicCodes.forEach(c=>{const n=parseInt(c.substring(2)),odd=n%2!==0;if(currentParity===null||(currentParity==='odd'&&odd)||(currentParity==='even'&&!odd))h+=`<option value="${c}">${c}</option>`;});
    return h;
  }
  function p2RefreshAllSelects(){
    let p=null;
    document.querySelectorAll('#p2-recordsContainer .val-temp-code').forEach(s=>{if(s.value.startsWith('8A'))p=(parseInt(s.value.substring(2))%2===0)?'even':'odd';});
    currentParity=p;
    document.querySelectorAll('#p2-recordsContainer .val-temp-code').forEach(s=>{const cur=s.value;s.innerHTML=p2GetOptionsHtml();s.value=cur;p2UpdateFieldColor(s);});
  }
  function p2HandleCheckboxChange(el){
    const card=el.closest('.record-item');
    const unitArea=card.querySelector('.val-unit');
    const chkCity=card.querySelector('.val-chk-city').checked,chkHighway=card.querySelector('.val-chk-highway').checked,chkNone=card.querySelector('.val-chk-none').checked;
    let items=[];
    if(chkCity) items.push("○○區○○時派遣2車2機擔任車隊加強編組");
    if(chkHighway) items.push("國道區○○時派遣前導殿後警車擔任車隊加強編組。");
    if(chkNone){if(chkCity)items.push("交通崗不申請");else items.push("不申請");}
    unitArea.value=items.map((text,i)=>(i+1)+"."+text).join('\n');
    p2AutoResizeHeight(unitArea); p2UpdateFieldColor(unitArea);
  }
  function p2AutoResizeHeight(el){if(el&&el.tagName==='TEXTAREA'){el.style.height='auto';el.style.height=el.scrollHeight+'px';}}
  function p2UpdateFieldColor(el){const val=el.value?.trim();if(val&&val!==""&&val!=="none")el.classList.add('has-content');else el.classList.remove('has-content');}
  p2.handleGlobalTimeCalc=function(){
    const p=$2('p2-globalDeptPlace').value,t=$2('p2-globalDeptTime').value;
    if(p==="敦南寓所"&&t.length===4){
      const adj=(m)=>{let d=new Date();d.setHours(t.substring(0,2),parseInt(t.substring(2,4))+m);return d.getHours().toString().padStart(2,'0')+d.getMinutes().toString().padStart(2,'0');};
      $2('p2-globalPrepTime').value=adj(-40);$2('p2-globalStandbyTime').value=adj(-20);
      p2UpdateFieldColor($2('p2-globalPrepTime'));p2UpdateFieldColor($2('p2-globalStandbyTime'));
    }
  };
  p2.refreshAllRoutes=function(){isRefreshingGlobal=true;Array.from(document.querySelectorAll('#p2-recordsContainer .val-place')).forEach(i=>p2HandlePlaceChange(i,false));isRefreshingGlobal=false;};
  function p2HandlePlaceChange(input,triggerGlobal=true){
    const container=$2('p2-recordsContainer'),all=Array.from(container.children),card=input.closest('.record-item'),idx=all.indexOf(card);
    const hsr=card.querySelector('.val-hsr'),placeInp=card.querySelector('.val-place'),mobR=card.querySelector('.val-mobile-route'),unit=card.querySelector('.val-unit');
    if(input.classList.contains('val-hsr')&&hsr.value!=="none"){placeInp.value=hsr.options[hsr.selectedIndex].text;}
    const placeVal=placeInp.value.trim(),deptP=$2('p2-globalDeptPlace').value.trim();
    let prevP=idx===0?deptP:(all[idx-1].querySelector('.val-place').value.trim()||deptP);
    const norm=s=>s.replace(/臺/g,'台'),nPrev=norm(prevP),nCurr=norm(placeVal);
    if(mobR.getAttribute('data-manual')!=='true'){
      if(nPrev.includes("高鐵")&&nCurr.includes("高鐵"))mobR.value="○○車次(0000-0000)";
      else if(placeVal&&placeVal!==prevP)if(!mobR.value.includes(placeVal))mobR.value=prevP+"→"+placeVal;
    }
    const isNoOut=["公保大樓","陽明寓所","敦南寓所"].includes(placeVal);
    if(isNoOut){card.querySelector('.val-chk-none').checked=true;card.querySelector('.val-chk-city').checked=false;card.querySelector('.val-chk-highway').checked=false;p2HandleCheckboxChange(card.querySelector('.val-chk-none'));}
    card.querySelector('.medical-box').style.display=card.querySelector('.shelter-box').style.display=isNoOut?'none':'block';
    card.querySelectorAll('textarea').forEach(f=>{p2AutoResizeHeight(f);p2UpdateFieldColor(f);});
    if(triggerGlobal&&!isRefreshingGlobal&&idx<all.length-1)p2.refreshAllRoutes();
  }
  p2.addRecord=function(isLast=false,savedData=null){
    recordCount++;const card=document.createElement('div');card.className="record-item collapsed";card.draggable=true;
    if(isLast)card.classList.add('last-stop-record');card.dataset.isLast=isLast;card.id=`p2-record-${recordCount}`;
    const isF=$2('p2-recordsContainer').children.length===0,deptP=$2('p2-globalDeptPlace').value.trim();
    card.innerHTML=`
      <div class="record-header"><div class="drag-handle">⠿</div><div class="seq-badge"><span></span></div><div class="top-fields">
        <div class="field-group"><label>代碼</label><select class="val-temp-code">${p2GetOptionsHtml()}</select></div>
        <div class="field-group"><label>高鐵站</label><select class="val-hsr" onchange="p2HandlePlaceChangeProxy(this)"><option value="none">- 無 -</option><option value="tp">台北站</option><option value="tc">台中站</option></select></div>
        <div class="field-group"><label>場所</label><input type="text" class="val-place" list="p2-place-options" oninput="p2HandlePlaceChangeProxy(this)"></div>
        <div class="field-group"><label>${isLast?"抵達":"到離"}</label><input type="text" class="val-time" placeholder="0000"></div>
      </div><div style="display:flex;gap:4px;margin-top:8px;"><button onclick="p2ToggleRecord(this)" class="btn-icon">展開</button><button onclick="this.closest('.record-item').remove();p2UpdateRecordNumbers();" class="btn-icon">✖</button></div></div>
      <div class="record-content">
        <div class="main-route-container">
          <div class="route-box"><label>機動路線 <button class="btn-arrow" onclick="p2AppendArrow(this,'val-mobile-route')">→</button></label><textarea class="val-mobile-route">${isF&&deptP?deptP+'→':''}</textarea></div>
          <div class="field-group"><label>負責單位</label><textarea class="val-unit"></textarea></div>
          <div class="field-group"><label>項目</label><div class="checkbox-group"><label><input type="checkbox" class="val-chk-city"> 縣市</label><label><input type="checkbox" class="val-chk-highway"> 國道</label><label><input type="checkbox" class="val-chk-none"> 不申請</label></div></div>
        </div>
        <div class="medical-box"><div style="display:grid;grid-template-columns:1fr 4fr;gap:12px;"><div><label>醫院</label><textarea class="val-medical-facility"></textarea></div><div style="border-left:1px solid #fecaca;padding-left:12px;"><label>醫療路線 <button class="btn-arrow" onclick="p2AppendArrow(this,'val-medical-route')">→</button></label><textarea class="val-medical-route"></textarea></div></div></div>
        <div class="shelter-box"><div style="display:grid;grid-template-columns:1fr 4fr;gap:12px;"><div><label>處所</label><textarea class="val-shelter"></textarea></div><div style="border-left:1px solid #bbf7d0;padding-left:12px;"><label>避難路線 <button class="btn-arrow" onclick="p2AppendArrow(this,'val-evacuation-route')">→</button></label><textarea class="val-evacuation-route"></textarea></div></div></div>
      </div>`;
    $2('p2-recordsContainer').appendChild(card);
    if(savedData){
      card.querySelector('.val-temp-code').value=savedData.code||"";
      card.querySelector('.val-place').value=savedData.place||"";
      card.querySelector('.val-mobile-route').value=savedData.mobR||"";
      card.querySelector('.val-evacuation-route').value=savedData.evaR||"";
      card.querySelector('.val-medical-route').value=savedData.medR||"";
      if(savedData.medF) card.querySelector('.val-medical-facility').value=savedData.medF;
      if(savedData.sheP) card.querySelector('.val-shelter').value=savedData.sheP;
      if(savedData.unit) card.querySelector('.val-unit').value=savedData.unit;
      if(savedData.hsr) card.querySelector('.val-hsr').value=savedData.hsr;
      if(savedData.time) card.querySelector('.val-time').value=savedData.time;
      card.querySelector('.val-chk-city').checked=!!savedData.chkC;
      card.querySelector('.val-chk-highway').checked=!!savedData.chkH;
      card.querySelector('.val-chk-none').checked=!!savedData.chkN;
      card.querySelectorAll('textarea,input').forEach(el=>{if(el.value)el.setAttribute('data-manual','true');});
      p2HandleCheckboxChange(card.querySelector('.val-chk-none'));
      p2HandlePlaceChange(card.querySelector('.val-place'),false);
    }
    p2UpdateRecordNumbers();

    // 拖曳事件
    card.addEventListener('dragstart',e=>{dragSrcEl=card;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');dragSrcEl=null;});
    card.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';});
    card.addEventListener('drop',e=>{e.preventDefault();if(dragSrcEl&&dragSrcEl!==card){const container=$2('p2-recordsContainer');const allCards=[...container.children];const srcIdx=allCards.indexOf(dragSrcEl),tgtIdx=allCards.indexOf(card);if(srcIdx<tgtIdx)container.insertBefore(dragSrcEl,card.nextSibling);else container.insertBefore(dragSrcEl,card);p2UpdateRecordNumbers();}});
  };

  function p2UpdateRecordNumbers(){let s=1;Array.from(document.querySelectorAll('#p2-recordsContainer .record-item')).forEach(c=>{const b=c.querySelector('.seq-badge span');b.textContent=c.dataset.isLast==="true"?"":s++;});}

  p2.generateWord=function(){
    if(cloudTemplateBinary) p2PerformGenerate(cloudTemplateBinary);
    else p2ShowMsg("請設定範本");
  };
  function p2PerformGenerate(binary){
    try{
      const zip=new PizZip(binary),doc=new window.docxtemplater(zip,{paragraphLoop:true,linebreaks:true});
      const dateRaw=$2('p2-inputDocDate').value,d=dateRaw?new Date(dateRaw):new Date();
      const docDate=`${d.getFullYear()-1911}年${d.getMonth()+1}月${d.getDate()}日(星期${["日","一","二","三","四","五","六"][d.getDay()]})`;
      const dept_time=$2('p2-globalDeptTime').value||"",prep_time=$2('p2-globalPrepTime').value||"",standby_time=$2('p2-globalStandbyTime').value||"";
      const records=Array.from(document.querySelectorAll('#p2-recordsContainer .record-item')).map(c=>{
        const t=c.querySelector('.val-time').value||"";
        return{temp_code:c.querySelector('.val-temp-code').value,time_arrive_leave:t.includes('-')?t.split('-').map(x=>x.trim()).join('\n︱\n'):t,
          visited_place:c.querySelector('.val-place').value,mobile_route:c.querySelector('.val-mobile-route').value,responsible_unit:c.querySelector('.val-unit').value,
          has_medical:c.querySelector('.medical-box').style.display!=='none',medical_facility:c.querySelector('.val-medical-facility').value,medical_route:c.querySelector('.val-medical-route').value,
          has_evacuation:c.querySelector('.shelter-box').style.display!=='none',shelter_place:c.querySelector('.val-shelter').value,evacuation_route:c.querySelector('.val-evacuation-route').value,
          chk_city:c.querySelector('.val-chk-city').checked,chk_highway:c.querySelector('.val-chk-highway').checked,chk_none:c.querySelector('.val-chk-none').checked};
      });
      doc.render({doc_date:docDate,dept_time,prep_time,standby_time,records});
      const m=(d.getMonth()+1).toString().padStart(2,'0'),date=d.getDate().toString().padStart(2,'0');
      saveAs(doc.getZip().generate({type:"blob"}),`${m}${date}道路表.docx`);
    }catch(err){p2ShowMsg("產製失敗："+err.message);}
  }

  // 全域 proxy 函式（供 HTML 內聯 onclick 使用）
  window.p2HandlePlaceChangeProxy=function(el){p2HandlePlaceChange(el);};
  window.p2ToggleRecord=function(btn){const c=btn.closest('.record-item');c.classList.toggle('collapsed');btn.innerHTML=c.classList.contains('collapsed')?'展開':'收合';if(!c.classList.contains('collapsed'))c.querySelectorAll('textarea').forEach(p2AutoResizeHeight);};
  window.p2AppendArrow=function(btn,className){const target=btn.closest('.record-item').querySelector('.'+className);target.value+='→';target.focus();p2AutoResizeHeight(target);p2UpdateFieldColor(target);};
  window.p2ExtractDestination=function(routeEl,targetClass){const target=routeEl.closest('.record-item').querySelector('.'+targetClass);const lastArrow=routeEl.value.lastIndexOf('→');if(lastArrow!==-1)target.value=routeEl.value.substring(lastArrow+1).trim();p2AutoResizeHeight(target);p2UpdateFieldColor(target);};
  window.p2UpdateRecordNumbers=p2UpdateRecordNumbers;

  // 監聽 p2-root 內的 input/textarea/select 事件
  document.addEventListener('input',(e)=>{
    if(!e.target.closest('#p2-root')) return;
    if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)){
      if(e.target.type==='checkbox'){p2HandleCheckboxChange(e.target);}
      else{
        if(e.target.classList.contains('val-temp-code')) p2RefreshAllSelects();
        if(e.target.id!=='p2-saveFileName') e.target.setAttribute('data-manual','true');
        p2UpdateFieldColor(e.target);p2AutoResizeHeight(e.target);
        if(e.target.classList.contains('val-medical-route')) window.p2ExtractDestination(e.target,'val-medical-facility');
        if(e.target.classList.contains('val-evacuation-route')) window.p2ExtractDestination(e.target,'val-shelter');
      }
    }
  });
  document.addEventListener('change',(e)=>{
    if(!e.target.closest('#p2-root')) return;
    if(e.target.type==='checkbox') p2HandleCheckboxChange(e.target);
  });

  window.addEventListener('DOMContentLoaded',()=>{
    p2.addRecord(false);
    p2InitFirebase();
  });
})();
</script>

<!-- ══ 外框控制腳本 ══ -->
<script>
  const pageNames={page1:'機動路線規劃工具',page2:'道路表文書系統'};

  function switchPage(btn){
    document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
    btn.classList.add('active');
    const target=btn.dataset.page;
    document.querySelectorAll('.page-panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-'+target).classList.add('active');
    document.getElementById('currentPageName').textContent=pageNames[target];
  }

  document.getElementById('toggleBtn').addEventListener('click',()=>{
    document.getElementById('sidebar').classList.toggle('collapsed');
  });
</script>
</body>
