<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>勤務管理平台</title>
  <!-- Firebase compat (page2 用) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <!-- docx / file tools (page2 用) -->
  <script src="https://unpkg.com/pizzip@3.1.7/dist/pizzip.js"></script>
  <script src="https://unpkg.com/docxtemplater@3.43.0/build/docxtemplater.js"></script>
  <script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.js"></script>
  <style>
/* ══ 平台框架 ══ */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:"Segoe UI","Microsoft JhengHei",sans-serif;background:#f2f2f2;color:#000;font-size:16px;line-height:1.5;overflow:hidden;height:100vh;display:flex;flex-direction:column;}

/* Tab 列 */
.platform-tabs{
  display:flex;align-items:stretch;background:#1a2332;height:48px;flex-shrink:0;
  border-bottom:2px solid #0078d7;
}
.platform-logo{
  display:flex;align-items:center;gap:10px;padding:0 18px;border-right:1px solid rgba(255,255,255,0.1);
}
.platform-logo .logo-icon{
  width:26px;height:26px;background:#0078d7;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:13px;font-weight:700;flex-shrink:0;
}
.platform-logo span{color:#fff;font-size:13px;font-weight:600;white-space:nowrap;}
.tab-btn{
  display:flex;align-items:center;gap:8px;padding:0 20px;border:none;background:none;
  color:rgba(255,255,255,0.55);font-size:13px;cursor:pointer;font-family:inherit;
  border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s;
  white-space:nowrap;
}
.tab-btn:hover{color:rgba(255,255,255,0.85);}
.tab-btn.active{color:#fff;border-bottom-color:#0078d7;}
.tab-btn svg{width:15px;height:15px;flex-shrink:0;}

/* 頁面容器 */
.tab-panel{display:none;flex:1;overflow:hidden;}
.tab-panel.active{display:block;}

/* ══ Page1 原始樣式 ══ */

    :root{
      --bg:#f2f2f2; --panel:#ffffff; --text:#000000; --muted:#666666; --border:#cccccc;
      --primary:#0078d7; --primary-hover:#005a9e; --btn-text:#ffffff;
      --danger:#e81123; --success:#107c10; --radius:0px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:"Segoe UI", "Microsoft JhengHei", sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.5}
    .app-container{
      display:grid;
      grid-template-columns: 1fr 500px;
      height:100vh;
      overflow:hidden;
    }
    #map-container{
      position:relative;
      height:100%;
      background:#d1d1d1;
      display:flex;
      flex-direction:column;
      border-right:1px solid var(--border);
    }
    #map{ flex: 1; width:100%; }
    
    .sidebar{
      background:var(--panel);
      display:flex;
      flex-direction:column;
      height: 100vh;
      z-index: 10;
      overflow: hidden;
    }
    .panel-content{
        padding:15px; 
        display:flex; 
        flex-direction:column; 
        gap:15px;
        overflow-y: auto;
        flex: 1;
    }
    label{display:block;color:var(--text);font-size:14px;font-weight:400;margin-bottom:4px}
    input,select,textarea{
      width:100%; border:1px solid var(--muted); border-radius:var(--radius);
      padding:8px 10px; font-size:15px; background:#fff; outline:none; transition:border-color .1s;
    }
    input:focus, select:focus, textarea:focus { border: 2px solid var(--primary); padding: 7px 9px; }
    textarea{ min-height:40px; resize:none; overflow:hidden; font-family: inherit; }
    .row{display:flex;gap:8px;align-items:center}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    button{
      border:1px solid transparent; background:#cccccc; color:#000000;
      padding:6px 12px; cursor:pointer; font-size:15px;
      display:inline-flex; align-items:center; justify-content:center; gap:6px; transition: all .1s;
    }
    button:hover{ background:#bbbbbb; }
    button.primary{background:var(--primary);color:var(--btn-text);border-color:var(--primary)}
    button.primary:hover{background:var(--primary-hover); border-color:var(--primary-hover)}
    button.danger{color:var(--btn-text); background:var(--danger); border-color:var(--danger)}
    .btn-locate-coord { padding: 8px; min-width: 38px; background: #f2f2f2; border: 1px solid var(--muted); }
    .route-segment-card { background: #ffffff; border: 1px solid var(--border); margin-bottom: 15px; transition: opacity 0.2s; }
    .route-segment-card summary { padding: 12px; cursor: pointer; list-style: none; background: #fdfdfd; font-weight: 600; }
    .route-segment-card[open] summary { border-bottom: 1px solid var(--border); background: #f2f2f2; }
    
    .segment-header-ui { display: flex; justify-content: space-between; align-items: center; width: 100%; }
    .segment-title { color: var(--primary); font-size: 15px; display: flex; align-items: baseline; gap: 6px; }
    
    .segment-inner-content { padding: 15px; display: flex; flex-direction: column; gap: 12px; }
    .segment-visibility-bar { background: #f2f2f2; border: 1px solid var(--border); padding: 6px 10px; display: flex; align-items: center; justify-content: space-around; }
    .segment-visibility-bar label { margin: 0; display: flex; align-items: center; gap: 4px; font-size: 13px; }
    .police-results-list { max-height: 150px; overflow-y: auto; border: 1px solid var(--border); background: #ffffff; margin-top: 8px; scroll-behavior: smooth; }
    .police-item { padding: 8px 12px; border-bottom: 1px solid #f2f2f2; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
    .police-item:hover { background: #e5f1fb; }
    .police-item.selected { background: #cce4f7; border-left: 3px solid var(--primary); }
    .legend{ position:absolute; top:10px; right:10px; background:rgba(255,255,255,0.9); padding:8px 12px; border:1px solid var(--border); font-size:12px; pointer-events:none; z-index:5; }
    .pill{display:flex; align-items:center; gap:6px}
    .pill::before{content:'';width:8px;height:8px;}
    .pill.main::before{background:var(--primary)}
    .pill.hospital::before{background:var(--danger)}
    .pill.police::before{background:#107c10}
    
    #toast{ position:fixed; bottom:20px; right:20px; background:#333333; color:#fff; padding:10px 20px; font-size:14px; opacity:0; pointer-events:none; transition:opacity .2s; z-index:1000; }
    #toast.show{opacity:1}
    
    .quick-select { height: 32px; font-size: 14px; padding: 0 8px; margin-top: 4px; background: #fff; border: 1px solid var(--muted); }
    .storage-list { max-height: 150px; overflow-y: auto; border: 1px solid var(--border); margin-top: 8px; background: #fff; }
    .storage-item { padding: 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
    
    .btn-tactical { font-size: 12px; padding: 2px 8px; background: transparent; color: var(--primary); border: 1px solid var(--primary); }
    .btn-tactical:hover { background: var(--primary); color: #fff; }
    
    .spacer { height: 50px; flex-shrink: 0; }
    optgroup { font-weight: bold; color: var(--primary); background: #f2f2f2; }
    
    #fileInput { display: none; }
  

/* ══ Page2 樣式 (加 p2- 前綴) ══ */

        :root {
            --primary: #0078d4;
            --primary-dark: #005a9e;
            --bg-gray: #f2f2f2;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-muted: #666666;
            --red-bg: #fde7e9;
            --green-bg: #dff6dd;
            --blue-bg: #e1f0fe;
            --border-color: #d2d2d2;
            --dark-bg: #2b2b2b;
            --dark-field: #333333;
            --content-bg: #ffe5d9; 
        }
        body {
            background-color: var(--bg-gray);
            font-family: "Segoe UI", "Microsoft JhengHei", Arial, sans-serif;
            margin: 0;
            padding: 8px;
            color: var(--text-main);
            overflow-x: hidden;
        }
        .p2-app-container { max-width: 155vh; margin: 0 auto; }
        .toolbar {
            background: #ffffff;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .toolbar h1 { 
            font-size: 16px; 
            margin: 0; 
            font-weight: 400;
            color: var(--text-main);
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }
        .toolbar h1::before {
            content: "田";
            font-size: 18px;
            color: var(--primary);
        }
        .cloud-manager {
            display: none; position: absolute; right: 0; top: 100%; margin-top: 1px; width: 450px;
            background: white; border: 1px solid var(--border-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 200; padding: 15px;
        }
        .show-ui { display: block; }
        .global-settings {
            background: var(--dark-bg);
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 12px;
        }
        .global-settings label { color: #ffffff; font-size: 13px; font-weight: normal; display: block; margin-bottom: 6px; }
        .global-settings input { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.3); 
            color: white; 
            padding: 6px;
        }
        .global-settings input:focus { background: white; color: black; border-color: var(--primary); outline: none; }
        .record-item {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 16px;
            margin-bottom: 12px;
            position: relative;
            transition: border-color 0.2s;
        }
        .record-item:hover { border-color: #999999; }
        .record-item.dragging { opacity: 0.5; border: 2px dashed var(--primary); }
        .drag-handle { cursor: grab; display: flex; align-items: center; justify-content: center; color: #aaaaaa; font-size: 20px; padding: 0 4px; user-select: none; }
        .record-header { display: flex; align-items: flex-start; gap: 12px; border-bottom: 1px solid #f0f0f0; padding-bottom: 12px; margin-bottom: 16px; }
        .record-item.collapsed .record-content { display: none; }
        
        .seq-badge { 
            background: var(--primary); 
            color: white; 
            font-weight: normal; 
            width: 32px; height: 32px; 
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; 
        }
        .top-fields { display: grid; grid-template-columns: 2fr 3fr 3fr 2fr; gap: 12px; flex-grow: 1; }
        .field-group { background: transparent; display: flex; flex-direction: column; }
        .field-group label { font-size: 13px; font-weight: 600; color: #333333; display: block; margin-bottom: 4px; }
        input, textarea, select { 
            width: 100%; 
            box-sizing: border-box; 
            border: 1px solid #999999; 
            padding: 6px 10px; 
            font-size: 15px; 
            font-family: inherit; 
            background: #ffffff;
            border-radius: 0;
        }
        input:focus, textarea:focus, select:focus { border: 2px solid var(--primary); padding: 5px 9px; outline: none; }
        .has-content { background-color: var(--content-bg) !important; border-color: #f2c1b0 !important; }
        
        textarea { resize: none; overflow: hidden; min-height: 48px; line-height: 1.5; }
        button, .btn-download, .btn-tag, .btn-cloud, .btn-add {
            border: none; padding: 8px 16px; font-size: 14px; cursor: pointer; border-radius: 0; background: #cccccc; color: black;
        }
        button:hover, .btn-add:hover { background: #bbbbbb; }
        .btn-download { background: var(--primary); color: white; }
        .btn-cloud { background: #333333; color: white; }
        .btn-arrow { width: 24px; height: 24px; background: #eeeeee; color: var(--primary); border: 1px solid #cccccc; margin-left: 8px; font-size: 12px; }
        .btn-icon { border:none; background:none; color:var(--text-muted); cursor:pointer; font-size:18px; padding: 4px; }
        .main-route-container { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 12px; }
        @media (min-width: 768px) {
            .main-route-container { grid-template-columns: 7fr 2fr 1fr; }
        }
        .route-box { background: var(--blue-bg); border: 1px solid #bce0fd; padding: 12px; }
        .medical-box { background: var(--red-bg); border: 1px solid #fbcaca; padding: 12px; }
        .shelter-box { background: var(--green-bg); border: 1px solid #bbf7d0; padding: 12px; }
        .checkbox-group { display: flex; flex-direction: column; gap: 6px; }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #333;
            cursor: pointer;
            white-space: nowrap;
        }
        .checkbox-group input[type="checkbox"] { width: 14px; height: 14px; margin: 0; }
        .btn-add { width: 100%; background: #ffffff; border: 1px solid var(--primary); color: var(--primary); font-weight: 600; margin-top: 8px; }
        #msgBox { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333333; color: white; padding: 12px 24px; z-index: 9999; display: none; }
        
        #cloudRecoveryBar {
            display: none; background: #fff4ce; border: 1px solid #fde79e; padding: 12px 16px; margin-bottom: 12px;
            justify-content: space-between; align-items: center; font-size: 13px; color: black; font-weight: 600;
        }
        .template-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
    

/* page2 scroll 修正 */
#p2-tab{overflow-y:auto;height:calc(100vh - 48px);}
  </style>
</head>
<body>

<!-- ══ Tab 列 ══ -->
<div class="platform-tabs">
  <div class="platform-logo">
    <div class="logo-icon">勤</div>
    <span>勤務管理平台</span>
  </div>
  <button class="tab-btn active" data-tab="p1-tab" onclick="switchTab(this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    機動路線規劃工具
  </button>
  <button class="tab-btn" data-tab="p2-tab" onclick="switchTab(this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
    </svg>
    道路表文書系統
  </button>
</div>

<!-- ══ Page1：機動路線規劃工具 ══ -->
<div class="tab-panel active" id="p1-tab">

<div class="app-container">
  <div id="map-container">
    <div class="legend">
      <div class="pill main">機動路線</div>
      <div class="pill hospital">醫院</div>
      <div class="pill police">派出所</div>
    </div>
    <div id="map"></div>
  </div>
  <div class="sidebar">
    <div class="panel-content">
      <details class="collapsible-section" style="border: 1px solid var(--border); background: #fff;">
        <summary style="padding:10px; font-size:14px; background: #fdf2f8;">💾 路線管理 (雲端/檔案)</summary>
        <div class="section-body" style="padding:10px">
            <div class="row" style="margin-bottom:8px">
                <input id="saveName" type="text" placeholder="路線名稱" style="font-size:14px;" />
                <button id="btnExportJson" title="匯出包含地理座標的 JSON" style="font-size:13px; min-width:80px;">💾 匯出</button>
                <button id="btnSaveCloud" class="primary" title="存至雲端記憶空間" style="font-size:13px; min-width:80px;">☁️ 雲端</button>
            </div>
            <button id="btnSendToDoc" style="width:100%; background:#107c10; color:#fff; border:none; font-size:13px; padding:7px; margin-bottom:8px; cursor:pointer;">📋 匯出並送至道路表文書系統</button>
            <button id="btnImportJson" style="width:100%; background:#e1dfdd; font-size:13px; margin-bottom:8px;">📂 載入本機 JSON 檔案</button>
            <input type="file" id="fileInput" accept=".json" />
            
            <div style="font-size:12px; color:var(--muted); margin:4px 0;">雲端存檔清單：</div>
            <div class="storage-list" id="storageList">
                <div style="padding:10px; color:var(--muted); text-align:center; font-size:13px;">載入雲端清單中...</div>
            </div>
        </div>
      </details>
      <details class="collapsible-section" open style="border: 1px solid var(--border); background: #fff;">
        <summary style="padding:10px; font-size:14px; background: #f2f2f2;">🗺️ 多段路線規劃</summary>
        <div class="section-body" id="route-segments-container" style="padding:10px"></div>
        <div style="padding: 0 10px 10px 10px;">
            <button id="btnAddSegment" class="primary" style="width:100%; font-size: 16px;">+ 新增下一段路線</button>
        </div>
      </details>
      <div class="grid-2">
          <details class="collapsible-section" style="border: 1px solid var(--border);">
            <summary style="padding:8px; font-size:13px;">🏥 醫院庫</summary>
            <div class="section-body" style="padding:8px">
                <div class="row"><input id="medInput" type="text" placeholder="名稱" /><button id="btnMedSearch">+</button></div>
                <select id="medDbSelect" size="4" style="margin-top:5px; font-size: 13px;"></select>
                <button id="btnDeleteMed" class="danger" style="width:100%; margin-top:5px; font-size: 12px; padding:4px;">刪除醫院</button>
            </div>
          </details>
          <details class="collapsible-section" style="border: 1px solid var(--border);">
            <summary style="padding:8px; font-size:13px;">⚙️ 設定</summary>
            <div class="section-body" style="padding:8px">
                <label style="font-size:12px;">Maps Key</label>
                <input id="apiKeyInput" type="password" value="AIzaSyDdWHINYxgA3YCE0PFlNNLhDLGvS_I6qCg" style="font-size:12px;" />
                <button id="btnLoad" class="primary" style="width:100%; margin-top:5px; font-size: 12px; padding:4px;">重載地圖</button>
            </div>
          </details>
      </div>
      <div class="spacer"></div>
    </div>
  </div>
</div>
<div id="toast">訊息</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDocs, deleteDoc, collection, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
  const firebaseConfig = JSON.parse(__firebase_config);
  const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  let currentUser = null;
  async function initAuth() {
    try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
        } else {
            await signInAnonymously(auth);
        }
    } catch (e) { console.error("Auth error", e); }
  }
  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    if (user) window.refreshStorageList();
  });
  const collectCurrentData = () => {
    const name = document.getElementById('saveName').value.trim() || "未命名路線";
    const segmentsData = Array.from(document.querySelectorAll('.route-segment-card')).map(card => {
        const sid = card.dataset.segmentId;
        const segState = state.segments[sid];
        const paths = {
            main: segState?.mainR?.getDirections()?.routes[0]?.overview_polyline || null,
            hospital: segState?.hospR?.getDirections()?.routes[0]?.overview_polyline || null,
            police: segState?.policeR?.getDirections()?.routes[0]?.overview_polyline || null
        };
        return {
            id: sid,
            config: {
                start: card.querySelector('.start-input').value,
                startAlias: card.querySelector('.start-alias').value,
                end: card.querySelector('.end-input').value,
                endAlias: card.querySelector('.end-alias').value,
                mode: card.querySelector('.mode-select').value,
                poiOrigin: card.querySelector('.poi-select').value
            },
            texts: {
                main: card.querySelector('.txt-main').value,
                police: card.querySelector('.txt-police').value,
                hospital: card.querySelector('.txt-hosp').value
            },
            paths: paths
        };
    });
    return { name, timestamp: Date.now(), segments: segmentsData, software: "TaiwanRoutePro_v2.5" };
  };
  window.exportToJson = () => {
    const data = collectCurrentData();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    a.href = url;
    a.download = `戰術路線_${data.name}_${dateStr}.json`;
    a.click();
    URL.revokeObjectURL(url);
    window.toast("JSON 數據（含地理座標）已導出");
  };
  window.saveToCloud = async () => {
    if (!currentUser) return window.toast("尚未驗證身份", "error");
    const data = collectCurrentData();
    const docId = 'cloud_' + Date.now();
    try {
        await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'routes', docId), { 
          ...data, 
          id: docId, 
          type: 'cloud', 
          createdAt: serverTimestamp() 
        });
        window.refreshStorageList();
        window.toast("雲端儲存成功（含地理數據）");

window.distM = (a, b) => {
  const lat1 = typeof a.lat === 'function' ? a.lat() : a.lat, lng1 = typeof a.lng === 'function' ? a.lng() : a.lng;
  const lat2 = typeof b.lat === 'function' ? b.lat() : b.lat, lng2 = typeof b.lng === 'function' ? b.lng() : b.lng;
  const R = 6371e3, f1 = lat1*Math.PI/180, f2 = lat2*Math.PI/180;
  const df = (lat2-lat1)*Math.PI/180, dl = (lng2-lng1)*Math.PI/180;
  const A = Math.sin(df/2)**2 + Math.cos(f1)*Math.cos(f2)*Math.sin(dl/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(A), Math.sqrt(1-A));
};

async function callGemini(systemPrompt, userQuery) {
    const apiKey = "AIzaSyBPRMSxIMchcKwtb1qX0wf-gkxKo4hjC4g"; 
    const model = "gemini-2.0-flash";
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
    const maxRetries = 5; let delay = 1000;
    for (let i = 0; i < maxRetries; i++) {

                body: JSON.stringify({ contents: [{ parts: [{ text: userQuery }] }], systemInstruction: { parts: [{ text: systemPrompt }] } })

}

    <script>
        let recordCount = 0;
        let currentParity = null; 
        let isRefreshingGlobal = false; 
        let user = null;
        let dragSrcEl = null;

        let latestSaveId = null;
        const fixedCodes = ["8171", "8172", "8173"];
        const dynamicCodes = Array.from({length: 20}, (_, i) => `8A${(i+1).toString().padStart(2, '0')}`);
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { apiKey: "" };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'duty-doc-generator';

        const auth = firebase.auth();
        const db = firebase.firestore();
        async function initFirebase() {
            loadTemplateFromCache();
            if (user) return;
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    await auth.signInAnonymously();
                }
                user = auth.currentUser;
                await loadTemplateFromCloud();
                await checkLatestCloudProgress();
            } catch (err) { console.error(err); }
        }
        function loadTemplateFromCache() {
            const cached = localStorage.getItem('docx_template_cache'), name = localStorage.getItem('docx_template_name');
            if (cached) { cloudTemplateBinary = base64ToBuffer(cached); updateTemplateUI(true, name || "本地"); }
        }
        async function loadTemplateFromCloud() {
            try {
                const doc = await db.doc(`artifacts/${appId}/users/${user.uid}/settings/template`).get();
                if (doc.exists) {
                    const data = doc.data(); cloudTemplateBinary = base64ToBuffer(data.binary);
                    localStorage.setItem('docx_template_cache', data.binary); localStorage.setItem('docx_template_name', data.name);
                    updateTemplateUI(true, data.name);
                }
            } catch (err) {}
        }
        async function uploadTemplateToCloud(input) {
            if (!input.files.length) return;
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64 = bufferToBase64(e.target.result);
                try {
                    await db.doc(`artifacts/${appId}/users/${user.uid}/settings/template`).set({ binary: base64, name: file.name, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    cloudTemplateBinary = e.target.result; updateTemplateUI(true, file.name); showMsg("✅ 樣本已更新");
                } catch (err) { showMsg("❌ 更新失敗"); }
            }; reader.readAsArrayBuffer(file);
        }
        function updateTemplateUI(isReady, name) {
            const dot = document.getElementById('p2-templateDot'), text = document.getElementById('p2-templateText');
            if (isReady) { dot.style.background = "#10b981"; text.textContent = `雲端樣本：${name}`; }
        }
        async function checkLatestCloudProgress() {
            try {
                const snapshot = await db.collection(`artifacts/${appId}/users/${user.uid}/saves`).get();
                if (!snapshot.empty) {
                    const saves = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    saves.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                    latestSaveId = saves[0].id; document.getElementById('p2-cloudRecoveryBar').style.display = 'flex';
                }
            } catch (err) {}
        }
        async function loadLatestFromCloud() { if (latestSaveId) { await loadDoc(latestSaveId); document.getElementById('p2-cloudRecoveryBar').style.display = 'none'; } }
        async function saveToCloud() {
            if (!user) await initFirebase();
            const data = captureCurrentData(), docId = data.saveName;
            try {
                await db.doc(`artifacts/${appId}/users/${user.uid}/saves/${docId}`).set({ ...data, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                showMsg(`✅ 已儲存：${docId}`);
            } catch (e) { showMsg("❌ 儲存失敗"); }
        }
        function bufferToBase64(buffer) { return btoa(new Uint8Array(buffer).reduce((data, byte) => data + String.fromCharCode(byte), '')); }
        function base64ToBuffer(base64) {
            const binaryString = atob(base64), bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
            return bytes.buffer;
        }
        function captureCurrentData() {

                    medR: card.querySelector('.val-medical-route').value,

                    evaR: card.querySelector('.val-evacuation-route').value,

        function restoreData(data) {

            document.getElementById('p2-globalPrepTime').value = data.global.prepTime;

        function refreshAllSelects() {

        function handleCheckboxChange(el) {
            const card = el.closest('.record-item');

            const chkNone = card.querySelector('.val-chk-none').checked;
            let items = [];
            if (chkCity) items.push("○○區○○時派遣2車2機擔任車隊加強編組");
            if (chkHighway) items.push("國道區○○時派遣前導殿後警車擔任車隊加強編組。");

                if (chkCity) items.push("交通崗不申請");

        function handleGlobalTimeCalc() {
            const p = document.getElementById('p2-globalDeptPlace').value, t = document.getElementById('p2-globalDeptTime').value;
            if (p === "敦南寓所" && t.length === 4) {
                const adj = (m) => { let d = new Date(); d.setHours(t.substring(0,2), parseInt(t.substring(2,4))+m); return d.getHours().toString().padStart(2,'0')+d.getMinutes().toString().padStart(2,'0'); };
                document.getElementById('p2-globalPrepTime').value = adj(-40); document.getElementById('p2-globalStandbyTime').value = adj(-20);
                updateFieldColor(document.getElementById('p2-globalPrepTime')); updateFieldColor(document.getElementById('p2-globalStandbyTime'));
            }
        }
        function toggleRecord(btn) { const c = btn.closest('.record-item'); c.classList.toggle('collapsed'); btn.innerHTML = c.classList.contains('collapsed') ? '展開' : '收合'; if (!c.classList.contains('collapsed')) c.querySelectorAll('textarea').forEach(autoResizeHeight); }
        function appendArrow(btn, className) {
            const target = btn.closest('.record-item').querySelector('.' + className);
            target.value += '→'; target.focus(); autoResizeHeight(target); updateFieldColor(target);
        }
        function handlePlaceChange(input, triggerGlobal = true) {
            const container = document.getElementById('p2-recordsContainer'), all = Array.from(container.children), card = input.closest('.record-item'), idx = all.indexOf(card);
            const hsr = card.querySelector('.val-hsr'), placeInp = card.querySelector('.val-place'), mobR = card.querySelector('.val-mobile-route'), unit = card.querySelector('.val-unit');
            if (input.classList.contains('val-hsr') && hsr.value !== "none") { placeInp.value = hsr.options[hsr.selectedIndex].text; }
            
            const placeVal = placeInp.value.trim(), deptP = document.getElementById('p2-globalDeptPlace').value.trim();
            let prevP = idx === 0 ? deptP : (all[idx - 1].querySelector('.val-place').value.trim() || deptP);
            const norm = s => s.replace(/臺/g, '台'), nPrev = norm(prevP), nCurr = norm(placeVal);
            
            if (mobR.getAttribute('data-manual') !== 'true') {
                if (nPrev.includes("高鐵") && nCurr.includes("高鐵")) mobR.value = "○○車次(0000-0000)";
                else if (placeVal && placeVal !== prevP) if (!mobR.value.includes(placeVal)) mobR.value = prevP + "→" + placeVal;
            }
            const isNoOut = ["公保大樓", "陽明寓所", "敦南寓所"].includes(placeVal);
            if (isNoOut) {
                card.querySelector('.val-chk-none').checked = true;
                card.querySelector('.val-chk-city').checked = false;
                card.querySelector('.val-chk-highway').checked = false;
                handleCheckboxChange(card.querySelector('.val-chk-none'));
            }
            card.querySelector('.medical-box').style.display = card.querySelector('.shelter-box').style.display = isNoOut ? 'none' : 'block';
            card.querySelectorAll('textarea').forEach(f => { autoResizeHeight(f); updateFieldColor(f); });
            if (triggerGlobal && !isRefreshingGlobal && idx < all.length - 1) refreshAllRoutes();
        }
        function refreshAllRoutes() { isRefreshingGlobal = true; Array.from(document.querySelectorAll('.val-place')).forEach(i => handlePlaceChange(i, false)); isRefreshingGlobal = false; }
        function addRecord(isLast = false, savedData = null) {
            recordCount++; const card = document.createElement('div'); card.className = "record-item collapsed"; card.draggable = true;
            if (isLast) card.classList.add('last-stop-record'); card.dataset.isLast = isLast; card.id = `record-${recordCount}`;
            const isF = document.getElementById('p2-recordsContainer').children.length === 0, deptP = document.getElementById('p2-globalDeptPlace').value.trim();
            card.innerHTML = `
                <div class="record-header"><div class="drag-handle">⠿</div><div class="seq-badge"><span></span></div><div class="top-fields">
                <div class="field-group"><label>代碼</label><select class="val-temp-code">${getOptionsHtml()}</select></div>
                <div class="field-group"><label>高鐵站</label><select class="val-hsr" onchange="handlePlaceChange(this)"><option value="none">- 無 -</option><option value="tp">台北站</option><option value="tc">台中站</option></select></div>
                <div class="field-group"><label>場所</label><input type="text" class="val-place" list="place-options" oninput="handlePlaceChange(this)"></div>
                <div class="field-group"><label>${isLast ? "抵達" : "到離"}</label><input type="text" class="val-time" placeholder="0000"></div>
                </div><div style="display:flex; gap:4px; margin-top:8px;"><button onclick="toggleRecord(this)" class="btn-icon">展開</button><button onclick="this.closest('.record-item').remove(); updateRecordNumbers();" class="btn-icon">✖</button></div></div>
                <div class="record-content">
                    <div class="main-route-container">
                        <div class="route-box"><label>機動路線 <button class="btn-arrow" onclick="appendArrow(this, 'val-mobile-route')">→</button></label><textarea class="val-mobile-route">${isF && deptP ? deptP + '→' : ''}</textarea></div>
                        <div class="field-group"><label>負責單位</label><textarea class="val-unit"></textarea></div>
                        <div class="field-group"><label>項目</label>
                            <div class="checkbox-group">
                                <label><input type="checkbox" class="val-chk-city"> 縣市</label>
                                <label><input type="checkbox" class="val-chk-highway"> 國道</label>
                                <label><input type="checkbox" class="val-chk-none"> 不申請</label>
                            </div>
                        </div>
                    </div>
                    <div class="medical-box"><div style="display:grid; grid-template-columns: 1fr 4fr; gap:12px;"><div><label>醫院</label><textarea class="val-medical-facility"></textarea></div><div style="border-left:1px solid #fecaca; padding-left:12px;"><label>醫療路線 <button class="btn-arrow" onclick="appendArrow(this, 'val-medical-route')">→</button></label><textarea class="val-medical-route"></textarea></div></div></div>
                    <div class="shelter-box"><div style="display:grid; grid-template-columns: 1fr 4fr; gap:12px;"><div><label>處所</label><textarea class="val-shelter"></textarea></div><div style="border-left:1px solid #bbf7d0; padding-left:12px;"><label>避難路線 <button class="btn-arrow" onclick="appendArrow(this, 'val-evacuation-route')">→</button></label><textarea class="val-evacuation-route"></textarea></div></div></div>
                </div>`;
            document.getElementById('p2-recordsContainer').appendChild(card);
            
            if (savedData) {
                card.querySelector('.val-temp-code').value = savedData.code || "";
                card.querySelector('.val-place').value = savedData.place || "";
                card.querySelector('.val-mobile-route').value = savedData.mobR || "";
                card.querySelector('.val-evacuation-route').value = savedData.evaR || "";
                card.querySelector('.val-medical-route').value = savedData.medR || "";
                card.querySelector('.val-chk-city').checked = !!savedData.chkC;
                card.querySelector('.val-chk-highway').checked = !!savedData.chkH;
                card.querySelector('.val-chk-none').checked = !!savedData.chkN;
                card.querySelectorAll('textarea, input').forEach(el => { if (el.value) el.setAttribute('data-manual', 'true'); });
                handleCheckboxChange(card.querySelector('.val-chk-none'));
                handlePlaceChange(card.querySelector('.val-place'), false);
            } updateRecordNumbers();
        }
        function updateRecordNumbers() {
            let s = 1; Array.from(document.document.getElementById('p2-tab').querySelectorAll('.record-item')).forEach(c => { const b = c.querySelector('.seq-badge span'); b.textContent = c.dataset.isLast === "true" ? "" : s++; });
        }
        function performGenerate(binary) {
            try {
                const zip = new PizZip(binary), doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });
                const dateRaw = document.getElementById('p2-inputDocDate').value, d = dateRaw ? new Date(dateRaw) : new Date();
                const docDate = `${d.getFullYear()-1911}年${d.getMonth()+1}月${d.getDate()}日(星期${["日","一","二","三","四","五","六"][d.getDay()]})`;
                const dept_time = document.getElementById('p2-globalDeptTime').value || "", prep_time = document.getElementById('p2-globalPrepTime').value || "", standby_time = document.getElementById('p2-globalStandbyTime').value || "";
                const records = Array.from(document.document.getElementById('p2-tab').querySelectorAll('.record-item')).map(c => {
                    const t = c.querySelector('.val-time').value || "";
                    return {
                        temp_code: c.querySelector('.val-temp-code').value, time_arrive_leave: t.includes('-') ? t.split('-').map(x => x.trim()).join('\n︱\n') : t,
                        visited_place: c.querySelector('.val-place').value, mobile_route: c.querySelector('.val-mobile-route').value, responsible_unit: c.querySelector('.val-unit').value,
                        has_medical: c.querySelector('.medical-box').style.display !== 'none', medical_facility: c.querySelector('.val-medical-facility').value, medical_route: c.querySelector('.val-medical-route').value,
                        has_evacuation: c.querySelector('.shelter-box').style.display !== 'none', shelter_place: c.querySelector('.val-shelter').value, evacuation_route: c.querySelector('.val-evacuation-route').value,
                        chk_city: c.querySelector('.val-chk-city').checked, chk_highway: c.querySelector('.val-chk-highway').checked, chk_none: c.querySelector('.val-chk-none').checked
                    };
                });
                doc.render({ doc_date: docDate, dept_time, prep_time, standby_time, records });
                const m = (d.getMonth()+1).toString().padStart(2,'0'), date = d.getDate().toString().padStart(2,'0');
                saveAs(doc.getZip().generate({ type: "blob" }), `${m}${date}道路表.docx`);
            } catch (err) { showMsg("產製失敗：" + err.message); }
        }
        function generateWord() { if (cloudTemplateBinary) performGenerate(cloudTemplateBinary); else showMsg("請設定範本"); }
        function showMsg(text) { const b = document.getElementById('p2-msgBox'); b.textContent = text; b.style.display = 'block'; setTimeout(() => b.style.display = 'none', 3000); }
        function toggleCloudManager() { document.getElementById('p2-cloudManager').classList.toggle('show-ui'); }
        function extractDestination(routeEl, targetClass) {
            const target = routeEl.closest('.record-item').querySelector('.' + targetClass);
            const lastArrow = routeEl.value.lastIndexOf('→');
            if (lastArrow !== -1) target.value = routeEl.value.substring(lastArrow + 1).trim();
            autoResizeHeight(target); updateFieldColor(target);
        }
        window.onload = async () => { addRecord(false); await initFirebase(); };

        // 供平台框架直接呼叫，靜默匯入路線規劃工具的資料
        window.importRouteFromPlanner = (d) => {
          if (!d || !d.segments) return;
          document.getElementById('p2-saveFileName').value = d.name || '匯入資料';
          document.getElementById('p2-recordsContainer').innerHTML = '';
          recordCount = 0;
          d.segments.forEach((seg) => {
            addRecord(false, {
              place: seg.config.endAlias || seg.config.end || '',
              mobR:  seg.texts.main     || '',
              evaR:  seg.texts.police   || '',
              medR:  seg.texts.hospital || '',
              chkN:  true
            });
          });
          showMsg(`✅ 已從路線規劃工具匯入 ${d.segments.length} 段資料`);
        };

        // 接收來自主框架的路線 JSON，靜默匯入
        window.addEventListener('message', (event) => {
          if (event.data && event.data.type === 'IMPORT_ROUTE_JSON') {
            const d = event.data.payload;
            if (!d || !d.segments) return;
            document.getElementById('p2-saveFileName').value = d.name || '匯入資料';
            document.getElementById('p2-recordsContainer').innerHTML = '';
            recordCount = 0;
            d.segments.forEach((seg) => {
              addRecord(false, {
                place: seg.config.endAlias || seg.config.end || '',
                mobR:  seg.texts.main     || '',
                evaR:  seg.texts.police   || '',
                medR:  seg.texts.hospital || '',
                chkN:  true
              });
            });
            showMsg(`✅ 已從路線規劃工具匯入 ${d.segments.length} 段資料`);
          }
        });
    </script>

</div>

<script>
// ── Tab 切換 ──
function switchTab(btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(btn.dataset.tab).classList.add('active');
  // Google Maps resize fix
  if (btn.dataset.tab === 'p1-tab' && window.google && window.google.maps && window._mapInstance) {
    google.maps.event.trigger(window._mapInstance, 'resize');
  }
}

// ── 送至道路表文書系統（直接呼叫，不需 postMessage）──
window.sendRouteToDoc = (data) => {
  if (!data || !data.segments || data.segments.length === 0) {
    window.toast('尚無路線資料可傳送', 'error');
    return;
  }
  // 切換到 page2
  const btn2 = document.querySelector('[data-tab="p2-tab"]');
  switchTab(btn2);
  // 直接呼叫 page2 的匯入函式
  setTimeout(() => {
    if (typeof window.importRouteFromPlanner === 'function') {
      window.importRouteFromPlanner(data);
    }
  }, 100);
};
</script>
</body>
</html>
